name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: hirushasandeeptha
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=00D4FF&color_dots=0d1117,#7B2FFF,#00D4FF,#FF00FF,#00D4FF
            dist/github-contribution-grid-snake.svg?color_snake=00D4FF&color_dots=0d1117,#7B2FFF,#00D4FF,#FF00FF,#00D4FF

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
