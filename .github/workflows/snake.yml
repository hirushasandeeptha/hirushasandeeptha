name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: hirushasandeeptha
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=00D4FF&color_dots=0d1117,#7B2FFF,#00D4FF,#FF00FF,#00D4FF
            dist/github-contribution-grid-snake.svg?color_snake=00D4FF&color_dots=0d1117,#7B2FFF,#00D4FF,#FF00FF,#00D4FF

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: .
          keep_files: true
          enable_jekyll: false
          force_orphan: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          publish_branch: output
