name: Generate Maeul in the Sky Terrain

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: t1seo/maeul-in-the-sky@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          hemisphere: south
          density: 7
          title: "Hirusha's Coding Village"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '✨ Update maeul terrain'
          file_pattern: 'maeul-in-the-sky-*.svg'
