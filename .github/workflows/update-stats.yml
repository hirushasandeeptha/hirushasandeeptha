name: Update Profile Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update stats
        run: |
          echo "Stats are dynamically generated by github-stats-extended.vercel.app"
          echo "No need to commit - they auto-update on page load"
          echo "Profile: https://github.com/hirushasandeeptha"
